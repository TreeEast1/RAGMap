  <text x="622" y="438" fill="#654221" font-size="28" font-family="Arial, sans-serif" font-weight="700">Agentic RAG 分支</text>
  <text x="622" y="474" fill="#8D6236" font-size="18" font-family="Arial, sans-serif">Planning and iterative retrieval</text>
  <text x="622" y="518" fill="#744F2A" font-size="18" font-family="Arial, sans-serif">• 任务分解与多轮检索</text>
  <text x="622" y="548" fill="#744F2A" font-size="18" font-family="Arial, sans-serif">• 检索-推理协同</text>
  <text x="622" y="578" fill="#744F2A" font-size="18" font-family="Arial, sans-serif">• Think-on-RAG 类路线</text>

  <rect x="840" y="392" width="270" height="210" rx="22" fill="#F5ECFA" stroke="#9B7DBD" stroke-width="2"/>
