  <text x="78" y="136" fill="#53635A" font-size="21" font-family="Arial, sans-serif">从单一路径的 RAG 流水线，走向多分支能力组合与自动选路</text>

  <rect x="470" y="176" width="260" height="92" rx="20" fill="#E6EFE7" stroke="#78907C" stroke-width="2"/>
  <text x="548" y="214" fill="#23352A" font-size="26" font-family="Arial, sans-serif" font-weight="700">RAGMap</text>
  <text x="500" y="244" fill="#476053" font-size="18" font-family="Arial, sans-serif">Knowledge Routing for RAG</text>

  <line x1="600" y1="268" x2="600" y2="328" stroke="#93A497" stroke-width="4"/>
  <line x1="600" y1="328" x2="235" y2="392" stroke="#93A497" stroke-width="4"/>
  <line x1="600" y1="328" x2="485" y2="392" stroke="#93A497" stroke-width="4"/>
