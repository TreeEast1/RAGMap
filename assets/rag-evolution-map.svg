  <text x="372" y="474" fill="#44608B" font-size="18" font-family="Arial, sans-serif">Graph-first retrieval</text>
  <text x="372" y="518" fill="#355075" font-size="18" font-family="Arial, sans-serif">• 实体关系与社区摘要</text>
  <text x="372" y="548" fill="#355075" font-size="18" font-family="Arial, sans-serif">• 全局主题理解</text>
  <text x="372" y="578" fill="#355075" font-size="18" font-family="Arial, sans-serif">• GraphRAG / LightRAG</text>

