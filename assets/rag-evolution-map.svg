  <text x="122" y="438" fill="#244333" font-size="28" font-family="Arial, sans-serif" font-weight="700">向量检索分支</text>
  <text x="122" y="474" fill="#406150" font-size="18" font-family="Arial, sans-serif">Vector-first retrieval</text>
  <text x="122" y="518" fill="#345444" font-size="18" font-family="Arial, sans-serif">• 标准知识库问答</text>
  <text x="122" y="548" fill="#345444" font-size="18" font-family="Arial, sans-serif">• 低成本、快落地</text>
  <text x="122" y="578" fill="#345444" font-size="18" font-family="Arial, sans-serif">• chunk / embedding / rerank</text>

