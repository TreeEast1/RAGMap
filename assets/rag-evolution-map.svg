  <text x="872" y="518" fill="#62417F" font-size="18" font-family="Arial, sans-serif">• 先理解问题再选路径</text>
  <text x="872" y="548" fill="#62417F" font-size="18" font-family="Arial, sans-serif">• vector / graph / agentic 切换</text>
  <text x="872" y="578" fill="#62417F" font-size="18" font-family="Arial, sans-serif">• 混合模式与 fallback</text>

